<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTA - PG STREET COFFEE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .receipt-page {
            max-width: 440px;
            margin: 40px auto;
            padding: 12px 16px;
        }
        .receipt-page .modal-box {
            padding: 30px 24px;
            max-width: 100%;
        }
        .receipt-page #receipt-container {
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .receipt-page .btn-punk,
        .receipt-page .btn-punk-outline {
            padding: 12px 20px;
            font-size: 0.85rem;
        }
        .receipt-block {
            border: 1px solid rgba(255,255,255,0.08);
            padding: 16px;
            border-radius: 18px;
            background: rgba(0,0,0,0.55);
        }
        .receipt-header, .receipt-info {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }
        .receipt-header small, .receipt-info small {
            color: var(--text-muted);
        }
        .receipt-items {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 10px;
        }
        .receipt-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.08);
            font-size: 0.88rem;
        }
        .receipt-row:last-child {
            border-bottom: none;
        }
        .receipt-row span {
            display: inline-block;
            min-width: 65px;
        }
        .receipt-meta {
            margin-top: 14px;
            font-size: 0.92rem;
            color: var(--text-muted);
        }
        .receipt-meta strong {
            color: var(--text-light);
            font-weight: 700;
        }
        @media print {
            .navbar, .receipt-page .btn-punk, .receipt-page .btn-punk-outline {
                display: none !important;
            }
            .receipt-page { margin: 0 !important; padding: 20px !important; }
            .receipt-page .modal-box { box-shadow: none !important; border: 1px solid #333 !important; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <button id="hamburger-menu" class="hamburger">&#9776;</button>
        <div class="nav-logo">PG <span>STREET COFFEE</span></div>
    </nav>

    <main class="receipt-page">
        <div class="modal-box">
            <h2 class="modal-title">NOTA PEMBAYARAN</h2>
            <div id="receipt-container" style="margin-top:18px; font-family: 'Courier New', monospace;"></div>
            <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
                <a href="menu.html" class="btn-punk-outline" style="padding:10px 18px; font-size:0.88rem;">KEMBALI</a>
                <button id="print-receipt" class="btn-punk" style="padding:10px 18px; font-size:0.88rem;">CETAK / SIMPAN</button>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let data = JSON.parse(localStorage.getItem('punkLastReceipt') || 'null');
            const container = document.getElementById('receipt-container');
            if (!data) {
                container.innerHTML = '<p>Tidak ada nota tersedia.</p>';
                return;
            }

            const itemsHtml = data.items.map(function(i) {
                return '<div class="receipt-row"><span>' + i.name + ' x' + i.quantity + '</span><span>IDR ' + i.price + 'K</span></div>';
            }).join('');

            let extraSection = '';
            if (data.method === 'qris') {
                extraSection = '<div style="margin-top:12px; text-align:center;"><p>Silakan pindai QR untuk membayar</p></div>';
            } else if (data.method === 'bank') {
                extraSection = '<div style="margin-top:12px;"><p>Instruksi transfer:</p><pre style="background:#000; padding:10px; border-radius:6px;">' + (data.bankInfo || 'Bank info tidak tersedia') + '</pre></div>';
            } else if (data.method === 'cod') {
                extraSection = '<p>COD: Siapkan pembayaran tunai saat kurir tiba.</p>';
            }

            container.innerHTML = `
                <div class="receipt-block">
                    <div class="receipt-header">
                        <div>
                            <div><strong>Nota#</strong> ${data.receiptId}</div>
                            <small>${new Date(data.createdAt).toLocaleString()}</small>
                        </div>
                        <div style="text-align:right; min-width: 140px;">
                            <div class="receipt-meta"><strong>Metode:</strong> ${data.method.toUpperCase()}</div>
                            <div class="receipt-meta"><strong>Status:</strong> ${data.status ? data.status.toUpperCase() : ''}</div>
                            <div class="receipt-meta"><strong>Total:</strong> IDR ${data.total}K</div>
                        </div>
                    </div>
                    <div class="receipt-items">${itemsHtml}</div>
                    ${extraSection}
                </div>
            `;

            document.getElementById('print-receipt').addEventListener('click', function() {
                window.print();
            });
        });
    </script>
</body>
</html>
